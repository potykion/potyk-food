site_name: potyk-food

site_url: https://potykion.github.io/potyk-food/
site_dir: site

repo_url: https://github.com/potykion/potyk-food
edit_uri: edit/master/docs/
repo_name: potykion/potyk-food
theme:
  name: material
  icon:
    logo: simple/mealie
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - content.action.edit

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # Делает обычные ссылки кликабельными (не надо обрамлять в []())
  - pymdownx.magiclink
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
plugins:
  - search
  - awesome-nav


extra_css:
  - stylesheets/extra.css
